<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 Cosmic Voyage — Live</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020308;--bg2:rgba(7,11,20,0.92);--bg3:#0d1220;
  --cyan:#00f5ff;--pink:#ff2d78;--gold:#ffcc00;--green:#00ff88;--purple:#bf5fff;
  --text:#e8f4ff;--muted:#4a6080;--dim:#1a2840;
}

/* ── 9:16 container ── */
html,body{width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;}
#root{position:relative;width:405px;height:720px;flex-shrink:0;overflow:hidden;background:var(--bg);}

/* scanlines */
#root::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 4px);pointer-events:none;z-index:150;}

/* starfield behind everything */
#sf{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.st{position:absolute;background:#fff;border-radius:50%;animation:twk linear infinite;}
@keyframes twk{0%,100%{opacity:.04}50%{opacity:.5}}

/* ── HEADER BAR — slim, always on top ── */
.hdr{
  position:absolute;top:0;left:0;right:0;z-index:20;
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 12px 6px;
  background:linear-gradient(180deg,rgba(2,3,8,0.95),rgba(2,3,8,0.7));
  border-bottom:1px solid rgba(0,245,255,0.12);
}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),var(--pink),transparent);}
.htitle{font-family:'Orbitron',monospace;font-size:.65rem;font-weight:900;background:linear-gradient(90deg,var(--cyan),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px;}
.live-pill{display:flex;align-items:center;gap:4px;background:rgba(255,45,120,0.15);border:1px solid rgba(255,45,120,0.4);border-radius:100px;padding:2px 8px;font-size:8px;font-weight:700;letter-spacing:2px;color:var(--pink);text-transform:uppercase;}
.lpulse{width:5px;height:5px;background:var(--pink);border-radius:50%;animation:lp 1s infinite;}
@keyframes lp{0%,100%{opacity:1;box-shadow:0 0 6px var(--pink)}50%{opacity:.3;box-shadow:0 0 14px var(--pink)}}
.hstats{display:flex;gap:10px;}
.hs{text-align:center;}
.hsv{font-family:'Orbitron',monospace;font-size:.6rem;font-weight:700;display:block;line-height:1.1;}
.hsl{font-size:6px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;}

/* ── CANVAS fills almost all space ── */
#gc{
  position:absolute;
  top:34px;   /* below header */
  left:0;right:0;
  bottom:130px; /* above bottom panels */
  width:100%;
  display:block;
  image-rendering:pixelated;
  z-index:1;
}

/* ── GAME HUD — floating over canvas top-left area ── */
.ghud-row{
  position:absolute;top:42px;left:8px;z-index:10;
  display:flex;gap:6px;
}
.ghud{
  background:rgba(2,3,8,0.78);
  border:1px solid rgba(0,245,255,0.18);
  border-radius:8px;padding:4px 8px;text-align:center;
  backdrop-filter:blur(4px);
}
.ghud-val{font-family:'Orbitron',monospace;font-size:.7rem;font-weight:700;display:block;}
.ghud-lbl{font-size:6px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-top:1px;}

/* ── BOTTOM PANELS — leaderboard + feed ── */
.bottom{
  position:absolute;bottom:0;left:0;right:0;z-index:20;
  height:130px;
  display:grid;grid-template-columns:1fr 1fr;
  gap:0;
  background:linear-gradient(0deg,rgba(2,3,8,0.98),rgba(2,3,8,0.85));
  border-top:1px solid rgba(0,245,255,0.1);
}

/* leaderboard */
.lb-wrap{border-right:1px solid var(--dim);overflow:hidden;display:flex;flex-direction:column;}
.panel-hdr{padding:4px 8px 3px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--dim);flex-shrink:0;}
.panel-ttl{font-family:'Orbitron',monospace;font-size:.5rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;}
.live-b{font-size:5px;font-weight:700;padding:1px 5px;border-radius:3px;background:rgba(0,255,136,0.1);color:var(--green);border:1px solid rgba(0,255,136,0.3);letter-spacing:.5px;text-transform:uppercase;}
.lb-list{flex:1;overflow:hidden;padding:4px 6px;display:flex;flex-direction:column;gap:2px;}
.lb-item{display:flex;align-items:center;gap:5px;padding:3px 5px;border-radius:5px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);flex-shrink:0;}
.lb-rank{font-family:'Orbitron',monospace;font-size:.52rem;font-weight:900;min-width:14px;text-align:center;}
.lb-av{width:16px;height:16px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:800;flex-shrink:0;font-family:'Orbitron',monospace;}
.lb-info{flex:1;min-width:0;}
.lb-name{font-size:.48rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px;}
.lb-bw{height:1.5px;background:var(--dim);border-radius:100px;overflow:hidden;}
.lb-bf{height:100%;border-radius:100px;transition:width .7s;}
.lb-sc{font-family:'Orbitron',monospace;font-size:.5rem;font-weight:700;flex-shrink:0;}

/* feed */
.feed-wrap{overflow:hidden;display:flex;flex-direction:column;}
.feed-inner{flex:1;overflow:hidden;padding:4px 6px;display:flex;flex-direction:column;gap:2px;position:relative;}
.feed-inner::after{content:'';position:absolute;bottom:0;left:0;right:0;height:20px;background:linear-gradient(to top,rgba(2,3,8,0.98),transparent);pointer-events:none;}
.msg-item{display:flex;gap:5px;align-items:flex-start;padding:3px 5px;border-radius:5px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);animation:msgIn .3s ease;flex-shrink:0;}
@keyframes msgIn{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:translateX(0)}}
.msg-av{width:16px;height:16px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:800;flex-shrink:0;font-family:'Orbitron',monospace;}
.msg-bd{flex:1;min-width:0;}
.msg-u{font-size:.45rem;font-weight:700;display:flex;align-items:center;gap:3px;margin-bottom:1px;}
.msg-t{font-size:.48rem;color:#7a94b8;line-height:1.3;}
.sbdg{font-size:4px;padding:1px 3px;border-radius:2px;font-weight:700;background:rgba(255,45,120,0.2);color:var(--pink);border:1px solid rgba(255,45,120,0.3);}
.sub-ev{display:flex;align-items:center;gap:5px;padding:3px 5px;border-radius:5px;background:rgba(255,45,120,0.07);border:1px solid rgba(255,45,120,0.25);animation:msgIn .3s ease;flex-shrink:0;}
.sub-ev-t{font-size:.48rem;color:var(--pink);font-weight:700;line-height:1.3;}
.kill-ev{display:flex;align-items:center;gap:4px;padding:3px 5px;border-radius:5px;background:rgba(0,255,136,0.05);border:1px solid rgba(0,255,136,0.2);animation:msgIn .3s ease;flex-shrink:0;}
.kill-ev-t{font-size:.48rem;color:var(--green);font-weight:600;flex:1;}
.kill-pts{font-family:'Orbitron',monospace;font-size:.45rem;color:var(--gold);}

/* ══════════════════════════════════════
   CTA OVERLAYS — appear on canvas
══════════════════════════════════════ */
.cta-overlay{
  position:absolute;z-index:50;
  pointer-events:none;
  opacity:0;
  transition:opacity .5s ease;
}
.cta-overlay.show{opacity:1;}
.cta-overlay.hide{opacity:0;}

/* Subscribe CTA — bottom of canvas */
#cta-sub{
  bottom:138px;left:0;right:0;
  display:flex;justify-content:center;
}
.cta-sub-inner{
  display:flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,rgba(255,45,120,0.22),rgba(255,45,120,0.1));
  border:1.5px solid rgba(255,45,120,0.7);
  border-radius:50px;
  padding:8px 20px;
  backdrop-filter:blur(8px);
  box-shadow:0 0 24px rgba(255,45,120,0.35);
  animation:ctaPulse 1.5s ease-in-out infinite;
}
@keyframes ctaPulse{0%,100%{box-shadow:0 0 18px rgba(255,45,120,0.3)}50%{box-shadow:0 0 36px rgba(255,45,120,0.6)}}
.cta-sub-icon{font-size:1.2rem;animation:bell 2s ease-in-out infinite;}
@keyframes bell{0%,70%,100%{transform:rotate(0)}75%{transform:rotate(-15deg)}82%{transform:rotate(15deg)}89%{transform:rotate(-8deg)}}
.cta-sub-text{font-family:'Orbitron',monospace;font-size:.62rem;font-weight:900;color:#fff;letter-spacing:1px;}
.cta-sub-sub{font-size:.5rem;color:rgba(255,180,200,0.8);margin-top:1px;letter-spacing:.5px;}

/* Like CTA */
#cta-like{
  top:50%;left:50%;transform:translate(-50%,-50%);
}
.cta-like-inner{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  background:rgba(2,3,8,0.85);
  border:1.5px solid rgba(255,204,0,0.6);
  border-radius:16px;
  padding:14px 24px;
  backdrop-filter:blur(10px);
  box-shadow:0 0 30px rgba(255,204,0,0.25);
  text-align:center;
}
.cta-like-emoji{font-size:2rem;animation:likeBounce .6s ease-in-out infinite alternate;}
@keyframes likeBounce{from{transform:scale(1)}to{transform:scale(1.15)}}
.cta-like-text{font-family:'Orbitron',monospace;font-size:.65rem;font-weight:900;color:var(--gold);letter-spacing:1px;}
.cta-like-sub{font-size:.5rem;color:rgba(255,220,100,0.7);}

/* Comment CTA */
#cta-comment{
  top:44px;left:0;right:0;
  display:flex;justify-content:center;
}
.cta-comment-inner{
  display:flex;align-items:center;gap:8px;
  background:rgba(2,3,8,0.85);
  border:1.5px solid rgba(0,245,255,0.55);
  border-radius:50px;
  padding:6px 16px;
  backdrop-filter:blur(8px);
  box-shadow:0 0 20px rgba(0,245,255,0.2);
}
.cta-comment-icon{font-size:.9rem;}
.cta-comment-text{font-family:'Orbitron',monospace;font-size:.55rem;font-weight:700;color:var(--cyan);}

/* Wave banner CTA */
#cta-wave{
  top:50%;left:50%;transform:translate(-50%,-50%);
}
.cta-wave-inner{
  background:rgba(2,3,8,0.88);
  border:1.5px solid rgba(0,255,136,0.6);
  border-radius:14px;
  padding:12px 22px;
  text-align:center;
  box-shadow:0 0 28px rgba(0,255,136,0.25);
  backdrop-filter:blur(8px);
}
.cta-wave-title{font-family:'Orbitron',monospace;font-size:.8rem;font-weight:900;color:var(--green);letter-spacing:1px;}
.cta-wave-sub{font-size:.52rem;color:rgba(0,255,136,0.7);margin-top:4px;}

/* Floating viewer count pulse */
#viewer-pulse{
  position:absolute;top:42px;right:8px;z-index:10;
  display:flex;align-items:center;gap:5px;
  background:rgba(2,3,8,0.78);
  border:1px solid rgba(255,45,120,0.3);
  border-radius:100px;padding:4px 10px;
  backdrop-filter:blur(4px);
}
.vp-dot{width:5px;height:5px;background:var(--pink);border-radius:50%;animation:lp 1.2s infinite;}
.vp-text{font-family:'Orbitron',monospace;font-size:.55rem;font-weight:700;color:var(--text);}
.vp-lbl{font-size:.42rem;color:var(--muted);}
</style>
</head>
<body>
<div id="root">
  <div id="sf"></div>

  <!-- HEADER -->
  <div class="hdr">
    <div class="htitle">⚡ COSMIC VOYAGE</div>
    <div class="live-pill"><div class="lpulse"></div>LIVE</div>
    <div class="hstats">
      <div class="hs"><span class="hsv" style="color:var(--cyan)" id="hV">1,284</span><span class="hsl">👁</span></div>
      <div class="hs"><span class="hsv" style="color:var(--pink)" id="hL">4,102</span><span class="hsl">❤️</span></div>
      <div class="hs"><span class="hsv" style="color:var(--gold)" id="hScore">0</span><span class="hsl">⭐</span></div>
      <div class="hs"><span class="hsv" style="color:var(--green)" id="hWave">Wave 1</span><span class="hsl">🌊</span></div>
      <div class="hs"><span class="hsv" style="color:var(--purple)" id="hUptime">00:00</span><span class="hsl">⏱</span></div>
    </div>
  </div>

  <!-- GAME CANVAS (fills the space between header and bottom panels) -->
  <canvas id="gc"></canvas>

  <!-- Floating HUD over canvas -->
  <div class="ghud-row">
    <div class="ghud"><span class="ghud-val" style="color:var(--gold)" id="gScore">0</span><span class="ghud-lbl">Score</span></div>
    <div class="ghud"><span class="ghud-val" style="color:var(--pink)" id="gLives">❤️❤️❤️</span><span class="ghud-lbl">Lives</span></div>
    <div class="ghud"><span class="ghud-val" style="color:var(--cyan)" id="gBest">0</span><span class="ghud-lbl">Best</span></div>
    <div class="ghud"><span class="ghud-val" style="color:var(--green)" id="gWave">1</span><span class="ghud-lbl">Wave</span></div>
  </div>

  <!-- Floating viewer count -->
  <div id="viewer-pulse">
    <div class="vp-dot"></div>
    <div>
      <div class="vp-text" id="vpCount">1,284</div>
      <div class="vp-lbl">WATCHING</div>
    </div>
  </div>

  <!-- CTA OVERLAYS -->
  <div class="cta-overlay" id="cta-sub">
    <div class="cta-sub-inner">
      <div class="cta-sub-icon">🔔</div>
      <div>
        <div class="cta-sub-text">SUBSCRIBE NOW</div>
        <div class="cta-sub-sub">Never miss a live stream!</div>
      </div>
    </div>
  </div>

  <div class="cta-overlay" id="cta-like">
    <div class="cta-like-inner">
      <div class="cta-like-emoji">👍</div>
      <div class="cta-like-text">SMASH THE LIKE!</div>
      <div class="cta-like-sub">If you're enjoying this run…</div>
    </div>
  </div>

  <div class="cta-overlay" id="cta-comment">
    <div class="cta-comment-inner">
      <div class="cta-comment-icon">💬</div>
      <div class="cta-comment-text">DROP A COMMENT BELOW!</div>
    </div>
  </div>

  <div class="cta-overlay" id="cta-wave">
    <div class="cta-wave-inner">
      <div class="cta-wave-title" id="cta-wave-title">⭐ WAVE CLEARED!</div>
      <div class="cta-wave-sub">Share this stream if you're hyped!</div>
    </div>
  </div>

  <!-- BOTTOM: Leaderboard + Feed -->
  <div class="bottom">
    <div class="lb-wrap">
      <div class="panel-hdr">
        <span class="panel-ttl" style="color:var(--gold)">🏆 Leaderboard</span>
        <span class="live-b">Live</span>
      </div>
      <div class="lb-list" id="lbList"></div>
    </div>
    <div class="feed-wrap">
      <div class="panel-hdr">
        <span class="panel-ttl" style="color:var(--purple)">💬 Chat</span>
        <span class="live-b">Live</span>
      </div>
      <div class="feed-inner" id="feedInner"></div>
    </div>
  </div>

</div><!-- /root -->

<script>
/* ── 9:16 fit ── */
const ROOT=document.getElementById('root');
function fit(){
  const vw=window.innerWidth,vh=window.innerHeight;
  let w,h;
  if(vh/vw>=16/9){w=vw;h=Math.round(vw*16/9);}
  else{h=vh;w=Math.round(vh*9/16);}
  ROOT.style.width=w+'px';ROOT.style.height=h+'px';
  ROOT.style.fontSize=(w/405)+'px';
}
window.addEventListener('resize',()=>{fit();sizeCanvas();initBG();});
fit();

/* ── Stars ── */
const sf=document.getElementById('sf');
for(let i=0;i<100;i++){
  const s=document.createElement('div');s.className='st';
  const z=Math.random()*1.8+.4;
  s.style.cssText=`width:${z}px;height:${z}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-duration:${2+Math.random()*5}s;animation-delay:${Math.random()*6}s`;
  sf.appendChild(s);
}

/* ── Live stats ── */
let viewers=1284,likes=4102,uptimeSec=0;
setInterval(()=>{
  viewers+=Math.floor(Math.random()*7)-2;viewers=Math.max(900,viewers);
  likes+=Math.floor(Math.random()*4);
  const vt=viewers.toLocaleString();
  document.getElementById('hV').textContent=vt;
  document.getElementById('vpCount').textContent=vt;
  document.getElementById('hL').textContent=likes.toLocaleString();
},3200);
setInterval(()=>{uptimeSec++;const m=String(Math.floor(uptimeSec/60)).padStart(2,'0'),s=String(uptimeSec%60).padStart(2,'0');document.getElementById('hUptime').textContent=`${m}:${s}`;},1000);

/* ── Leaderboard ── */
const LBC=[
  {bdr:'rgba(255,204,0,0.5)',bar:'#ffcc00',txt:'#ffcc00',av:'rgba(255,204,0,0.2)'},
  {bdr:'rgba(192,192,192,0.4)',bar:'#c0c0c0',txt:'#c0c0c0',av:'rgba(192,192,192,0.15)'},
  {bdr:'rgba(205,127,50,0.4)',bar:'#cd7f32',txt:'#cd7f32',av:'rgba(205,127,50,0.15)'},
  {bdr:'rgba(0,245,255,0.3)',bar:'#00f5ff',txt:'#00f5ff',av:'rgba(0,245,255,0.12)'},
  {bdr:'rgba(191,95,255,0.3)',bar:'#bf5fff',txt:'#bf5fff',av:'rgba(191,95,255,0.1)'},
];
const LBR=['🥇','🥈','🥉','4','5'];
let lbData=[
  {n:'StarKiller',s:52840,prev:52840},
  {n:'NeonViper',s:41200,prev:41200},
  {n:'CosmicAce',s:33760,prev:33760},
  {n:'VoidHunter',s:28490,prev:28490},
  {n:'PILOT 🚀',s:0,prev:0,isYou:true},
];
function renderLB(){
  const ul=document.getElementById('lbList');ul.innerHTML='';
  const mx=Math.max(...lbData.map(e=>e.s),1);
  lbData.sort((a,b)=>b.s-a.s);
  lbData.forEach((e,i)=>{
    if(i>=5)return;
    const c=LBC[i%LBC.length];
    const pct=Math.round(e.s/mx*100);
    const d=e.s-e.prev;
    const li=document.createElement('li');li.className='lb-item';
    li.style.cssText=`border-color:${c.bdr}`;
    li.innerHTML=`<span class="lb-rank" style="color:${c.txt}">${LBR[i]||i+1}</span>
    <div class="lb-av" style="background:${c.av};color:${c.txt}">${e.n.slice(0,2).toUpperCase()}</div>
    <div class="lb-info"><div class="lb-name">${e.n}</div>
    <div class="lb-bw"><div class="lb-bf" style="width:${pct}%;background:${c.bar}"></div></div></div>
    <span class="lb-sc" style="color:${c.txt}">${e.s>=1000?(e.s/1000).toFixed(1)+'k':e.s}</span>`;
    ul.appendChild(li);
  });
}
function tickLB(){lbData.forEach(e=>{if(!e.isYou){e.prev=e.s;e.s+=Math.floor(Math.random()*220);}});renderLB();}
renderLB();
setInterval(tickLB,4200);

/* ── Viewer Feed ── */
const NAMES=['StarViper','NeonSoul','CosmicK','PixelWulf','GhostAce','VoidMind','NovaFire','ByteRacer','SkyBreak','HexDawn','CyberZen','LunarEdge'];
const MSGS=[
  ['💜 That dodge was insane!',false],['🔥 Never misses',false],['🎮 So satisfying to watch',false],
  ['⭐ New high score??',false],['😱 Wave already!',false],['the combo on that 🎯',false],
  ['👾 best stream every day',false],['LETS GOOO!!',false],['🌊 wave clear!!',false],
  ['subbed for this energy 🔔',true],['❤️❤️❤️',false],['that shield save was PERFECT',false],
  ['💎 top tier content',true],['🚀 score going brrrr',false],['the particles 🤌',false],
];
const FCOLS=['rgba(0,245,255,0.15)','rgba(255,45,120,0.12)','rgba(191,95,255,0.12)','rgba(255,204,0,0.12)','rgba(0,255,136,0.1)'];
const FTCOLS=['#00f5ff','#ff2d78','#bf5fff','#ffcc00','#00ff88'];
let feedItems=[];
function addFeedMsg(type='msg',extra={}){
  const feed=document.getElementById('feedInner');
  let el=document.createElement('div');
  if(type==='msg'){
    const[msg,isSub]=MSGS[Math.floor(Math.random()*MSGS.length)];
    const nm=NAMES[Math.floor(Math.random()*NAMES.length)];
    const ci=Math.floor(Math.random()*FCOLS.length);
    el.className='msg-item';el.style.cssText=`background:${FCOLS[ci]};border-color:${FTCOLS[ci]}44`;
    el.innerHTML=`<div class="msg-av" style="background:${FCOLS[ci]};color:${FTCOLS[ci]}">${nm.slice(0,2).toUpperCase()}</div>
    <div class="msg-bd"><div class="msg-u" style="color:${FTCOLS[ci]}">${nm}${isSub?'<span class="sbdg">SUB</span>':''}</div>
    <div class="msg-t">${msg}</div></div>`;
  } else if(type==='sub'){
    el.className='sub-ev';
    el.innerHTML=`<span style="font-size:.7rem">🔔</span><div class="sub-ev-t">${extra.name} subscribed!</div>`;
  } else if(type==='kill'){
    el.className='kill-ev';
    el.innerHTML=`<span style="font-size:.7rem">${extra.icon}</span><div class="kill-ev-t">Pilot destroyed ${extra.name}</div><span class="kill-pts">+${extra.pts}</span>`;
  }
  feed.insertBefore(el,feed.firstChild);
  feedItems.push(el);
  if(feedItems.length>8)feed.removeChild(feedItems.shift());
}
setInterval(()=>addFeedMsg('msg'),2200);
setInterval(()=>{if(Math.random()<.18)addFeedMsg('sub',{name:NAMES[Math.floor(Math.random()*NAMES.length)]});},7000);

const CTAS=['cta-sub','cta-like','cta-comment'];
let ctaActive=null,ctaTimer=null;

function showCTA(id,duration=4000){
  // hide any active
  if(ctaActive){
    document.getElementById(ctaActive).classList.remove('show');
    document.getElementById(ctaActive).classList.add('hide');
  }
  clearTimeout(ctaTimer);
  ctaActive=id;
  const el=document.getElementById(id);
  el.classList.remove('hide');
  el.classList.add('show');
  ctaTimer=setTimeout(()=>{
    el.classList.remove('show');
    el.classList.add('hide');
    ctaActive=null;
  },duration);
}

// Schedule CTAs at irregular intervals
let ctaQueue=['cta-sub','cta-like','cta-comment','cta-sub'];
let ctaIdx=0;
function nextCTA(){
  const id=ctaQueue[ctaIdx%ctaQueue.length];ctaIdx++;
  showCTA(id,4500);
  // next one in 18–32 seconds
  setTimeout(nextCTA,18000+Math.random()*14000);
}

let AC=null;
function getAC(){
  if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();AC.resume().catch(()=>{});}catch(e){}}
  return AC;
}
function tone(f,t,dur,g,d=0){setTimeout(()=>{try{const c=getAC();if(!c)return;const o=c.createOscillator(),gn=c.createGain();o.frequency.value=f;o.type=t;gn.gain.value=g;gn.gain.linearRampToValueAtTime(0,c.currentTime+dur);o.connect(gn);gn.connect(c.destination);o.start();o.stop(c.currentTime+dur);}catch(e){}},d);}
function sfxCoin(){tone(880,'sine',.08,.25);tone(1100,'sine',.08,.18,45);}
function sfxHit(){try{const c=getAC();if(!c)return;const b=c.createBuffer(1,c.sampleRate*.15,c.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);const s=c.createBufferSource();s.buffer=b;const g=c.createGain();g.gain.value=.5;s.connect(g);g.connect(c.destination);s.start();}catch(e){}}
function sfxWave(){[523,659,784,1047].forEach((f,i)=>tone(f,'square',.14,.18,i*110));}
function sfxPow(){tone(440,'sine',.3,.22);tone(660,'sine',.25,.18,80);}

/* ══════════════════════════════════════
   GAME ENGINE
══════════════════════════════════════ */
const cv=document.getElementById('gc');
const ctx2=cv.getContext('2d');
let GW,GH;

function sizeCanvas(){
  const r=ROOT.getBoundingClientRect();
  GW=Math.round(r.width);
  // canvas goes from y=34 (below header) to y=(rootHeight-130) (above bottom bar)
  GH=Math.round(r.height)-34-130;
  cv.width=GW;cv.height=GH;
  cv.style.width=GW+'px';cv.style.height=GH+'px';
}

const COL={
  bg:'#020308',
  shipBody:'#00f5ff',shipGlow:'rgba(0,245,255,0.4)',
  shipWing:'rgba(0,245,255,0.3)',
  thruster:'#ff8c00',thruster2:'rgba(255,140,0,0.3)',
  bullet:'#00f5ff',bulletGlow:'rgba(0,245,255,0.5)',
  e0:'#ff2d78',e0g:'rgba(255,45,120,0.4)',
  e1:'#ffcc00',e1g:'rgba(255,204,0,0.4)',
  e2:'#00ff88',e2g:'rgba(0,255,136,0.4)',
  e3:'#bf5fff',e3g:'rgba(191,95,255,0.4)',
  coin:'#ffcc00',coinG:'rgba(255,204,0,0.5)',
  shield:'#00f5ff',
  px1:'#ff2d78',px2:'#00f5ff',px3:'#ffcc00',px4:'#00ff88',
};
const ECOLS=[COL.e0,COL.e1,COL.e2,COL.e3];
const PXCOLS=[COL.px1,COL.px2,COL.px3,COL.px4];
const ENEMY_NAMES=['Wraith','Phantom','Shadow','Specter','Void','Nova','Pulse','Echo'];

let gScore=0,gLives=3,gWave=1,gBest=0,gFrame=0,gRunning=true,gWCD=0;
let ship,bullets=[],enemies=[],coins=[],parts=[],pups=[],bgStars=[];
let shield=false,shieldT=0;
let autoFireT=0,combo=0,comboT=0;
let aiTargX,aiTargY,aiPhase=0,aiPhaseT=0;
let waveText='',waveTextT=0;
let totalKills=0;

function initBG(){
  bgStars=[];
  for(let i=0;i<160;i++){
    bgStars.push({x:Math.random()*GW,y:Math.random()*GH,r:.2+Math.random()*.9,spd:.2+Math.random()*.9,a:.15+Math.random()*.7,tw:Math.random()*Math.PI*2});
  }
}
function initShip(){aiTargX=GW/2;aiTargY=GH*.8;ship={x:GW/2,y:GH*.82,inv:0,tf:0,trail:[]};}

function spawnWave(){
  const count=Math.min(6+gWave*2,22);
  for(let i=0;i<count;i++){
    const r=Math.random();
    const t=gWave<2?0:(r<.4?0:r<.65?1:r<.82?2:3);
    const col=Math.random()*6;
    let x,y;
    if(col<2){x=60+(i%7)*(GW-120)/6;y=-35-(Math.floor(i/7)*55);}
    else if(col<4){x=GW/2+Math.cos(i/count*Math.PI*2)*Math.min(GW*.38,160);y=-60-i*20;}
    else{x=i%2===0?70:GW-70;y=-30-i*35;}
    enemies.push({
      x,y,t,
      w:t===3?28:t===1?22:18,h:t===3?26:t===1?20:16,
      hp:t===3?4:t===1?2:1,mhp:t===3?4:t===1?2:1,
      vx:(Math.random()-.5)*.5,vy:.55+gWave*.06+Math.random()*.4,
      rot:0,rs:(Math.random()-.5)*.055,zz:t===3||Math.random()>.6,zt:0,
      pulse:Math.random()*Math.PI*2,dc:Math.random()<.4,
    });
  }
}
function spawnCoin(x,y){coins.push({x,y,vx:(Math.random()-.5)*1.6,vy:-1.8+Math.random()*.5,r:5,lf:220,col:false,spin:0});}
function burst(x,y,cols,n=10){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=.8+Math.random()*3.5;
    parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:1.2+Math.random()*2.8,lf:30+Math.random()*28,ml:55,col:cols[Math.floor(Math.random()*cols.length)],a:1,type:Math.random()<.4?'ring':'dot'});
  }
}
function spawnPup(x,y){if(Math.random()<.16)pups.push({x,y,vy:.65,t:Math.floor(Math.random()*3),r:10,lf:300,p:0});}

function updateAI(){
  aiPhaseT--;
  if(aiPhaseT<=0){
    aiPhase=Math.floor(Math.random()*6);aiPhaseT=50+Math.floor(Math.random()*80);
    if(aiPhase===0){aiTargX=GW*.15;aiTargY=GH*.78;}
    else if(aiPhase===1){aiTargX=GW*.85;aiTargY=GH*.78;}
    else if(aiPhase===2){aiTargX=GW*.5;aiTargY=GH*.85;}
    else if(aiPhase===3){if(enemies.length){const ne=enemies.reduce((a,b)=>b.y>a.y?b:a);aiTargX=ne.x;aiTargY=GH*.78;}}
    else if(aiPhase===4){if(coins.length){const nc=coins.reduce((a,b)=>Math.hypot(b.x-ship.x,b.y-ship.y)<Math.hypot(a.x-ship.x,a.y-ship.y)?b:a);aiTargX=nc.x;aiTargY=nc.y;}else{aiTargX=GW/2;aiTargY=GH*.78;}}
    else{aiTargX=Math.random()<.5?GW*.2:GW*.8;aiTargY=GH*.75;}
  }
  enemies.forEach(e=>{if(e.y>GH*.45&&Math.abs(e.x-ship.x)<50){aiTargX+=ship.x<GW/2?80:-80;}});
  aiTargX=Math.max(30,Math.min(GW-30,aiTargX));
  const dx=aiTargX-ship.x,dy=aiTargY-ship.y,dist=Math.hypot(dx,dy),spd=2.6+gWave*.08;
  if(dist>1.5){ship.x+=dx/dist*Math.min(dist,spd);ship.y+=dy/dist*Math.min(dist,spd*.75);}
  ship.x=Math.max(20,Math.min(GW-20,ship.x));
  ship.y=Math.max(GH*.52,Math.min(GH-16,ship.y));
  ship.trail.unshift({x:ship.x,y:ship.y});
  if(ship.trail.length>18)ship.trail.pop();
}

function update(){
  if(!gRunning)return;
  gFrame++;
  bgStars.forEach(s=>{s.y+=s.spd;if(s.y>GH){s.y=-2;s.x=Math.random()*GW;}});
  updateAI();
  ship.inv=Math.max(0,ship.inv-1);ship.tf=(ship.tf+1)%8;
  // Auto fire
  autoFireT++;const fr=Math.max(7,15-gWave);
  if(autoFireT>=fr){
    autoFireT=0;
    if(enemies.length){
      const targets=enemies.slice().sort((a,b)=>b.y-a.y).slice(0,2);
      targets.forEach((ne,idx)=>{
        const ddx=ne.x-ship.x,ddy=ne.y-ship.y,mg=Math.hypot(ddx,ddy)||1,sp=10;
        bullets.push({x:ship.x+(idx===1?8:-8),y:ship.y-12,vx:ddx/mg*sp,vy:ddy/mg*sp,r:2.5+idx*.5,lf:60,dual:idx===1});
        if(shield&&idx===0)bullets.push({x:ship.x+14,y:ship.y-6,vx:ddx/mg*sp*.85+.5,vy:ddy/mg*sp*.9,r:2,lf:52,dual:true});
      });
    } else {
      bullets.push({x:ship.x-4,y:ship.y-12,vx:-.2,vy:-10,r:2.5,lf:55,dual:false});
      bullets.push({x:ship.x+4,y:ship.y-12,vx:.2,vy:-10,r:2.5,lf:55,dual:true});
    }
  }
  bullets=bullets.filter(b=>{b.x+=b.vx;b.y+=b.vy;b.lf--;return b.lf>0&&b.y>-10&&b.y<GH+10&&b.x>-10&&b.x<GW+10;});
  enemies.forEach(e=>{e.x+=e.vx;e.y+=e.vy;e.rot+=e.rs;e.pulse+=.07;if(e.zz){e.zt++;e.x+=Math.sin(e.zt*.065)*1.2;}if(e.x<16||e.x>GW-16)e.vx*=-1;});
  outer:for(let bi=bullets.length-1;bi>=0;bi--){
    const b=bullets[bi];
    for(let ei=enemies.length-1;ei>=0;ei--){
      const e=enemies[ei];
      if(Math.hypot(b.x-e.x,b.y-e.y)<(e.w*.5+b.r)){
        bullets.splice(bi,1);e.hp--;
        burst(b.x,b.y,[ECOLS[e.t],'#fff'],5);
        if(e.hp<=0){
          burst(e.x,e.y,[ECOLS[e.t],PXCOLS[1],'#fff'],16);
          sfxCoin();totalKills++;
          const pts=10*(e.t+1)*(1+Math.floor(gWave/2))*(combo>1?combo:1);
          gScore+=pts;combo++;comboT=60;
          if(e.dc)spawnCoin(e.x,e.y);spawnPup(e.x,e.y);
          addFeedMsg('kill',{icon:['💥','⚡','🌟','👾'][e.t],name:ENEMY_NAMES[Math.floor(Math.random()*ENEMY_NAMES.length)],pts});
          enemies.splice(ei,1);
          updateGameUI();
          lbData[lbData.length-1].prev=lbData[lbData.length-1].s;
          lbData[lbData.length-1].s=gScore;renderLB();
        }
        continue outer;
      }
    }
  }
  if(ship.inv===0){
    for(let ei=enemies.length-1;ei>=0;ei--){
      const e=enemies[ei];
      if(e.y>GH-6||(Math.hypot(e.x-ship.x,e.y-ship.y)<(e.w*.45+9)&&!shield)){
        sfxHit();burst(e.x,e.y,[ECOLS[e.t],COL.px1,'#fff'],12);
        enemies.splice(ei,1);gLives--;ship.inv=90;combo=0;
        updateGameUI();if(gLives<=0){endGame();return;}break;
      }
    }
  }
  for(let ci=coins.length-1;ci>=0;ci--){
    const c=coins[ci];c.x+=c.vx;c.y+=c.vy;c.vy+=.05;c.lf--;c.spin+=.1;
    if(!c.col&&Math.hypot(c.x-ship.x,c.y-ship.y)<18){c.col=true;const pts=5*(1+Math.floor(gWave/3));gScore+=pts;burst(c.x,c.y,[COL.coin,'#fff'],6);updateGameUI();lbData[lbData.length-1].s=gScore;}
    if(c.lf<=0||c.col)coins.splice(ci,1);
  }
  for(let pi=pups.length-1;pi>=0;pi--){
    const p=pups[pi];p.y+=p.vy;p.lf--;p.p+=.1;
    if(Math.hypot(p.x-ship.x,p.y-ship.y)<18){
      if(p.t===0){gLives=Math.min(6,gLives+1);}
      else if(p.t===1){shield=true;shieldT=200;}
      else{gScore+=80;}
      sfxPow();burst(p.x,p.y,[COL.coin,'#fff',COL.shipBody],14);
      pups.splice(pi,1);updateGameUI();continue;
    }
    if(p.y>GH||p.lf<=0)pups.splice(pi,1);
  }
  if(shield){shieldT--;if(shieldT<=0)shield=false;}
  if(comboT>0){comboT--;if(comboT<=0)combo=0;}
  parts=parts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=.92;p.vy*=.92;p.lf--;p.a=p.lf/p.ml;return p.lf>0;});
  if(waveTextT>0)waveTextT--;
  if(enemies.length===0){
    gWCD++;
    if(gWCD>80){
      gWCD=0;gWave++;gBest=Math.max(gBest,gScore);
      document.getElementById('gWave').textContent=gWave;
      document.getElementById('hWave').textContent=`Wave ${gWave}`;
      document.getElementById('gBest').textContent=gBest.toLocaleString();
      waveText=`⭐ WAVE ${gWave-1} CLEARED!`;waveTextT=100;
      spawnWave();sfxWave();
      burst(GW/2,GH/2,[COL.shipBody,COL.coin,COL.px1,'#fff'],28);
      showWaveCTA(gWave-1);
    }
  }
}

function updateGameUI(){
  document.getElementById('gScore').textContent=gScore.toLocaleString();
  document.getElementById('hScore').textContent=gScore.toLocaleString();
  const hearts='❤️'.repeat(Math.max(0,gLives));
  document.getElementById('gLives').textContent=hearts||'💀';
  if(gScore>gBest){gBest=gScore;document.getElementById('gBest').textContent=gBest.toLocaleString();}
}

function draw(){
  const g=ctx2;
  g.clearRect(0,0,GW,GH);
  const bgGrad=g.createLinearGradient(0,0,0,GH);
  bgGrad.addColorStop(0,'#020308');bgGrad.addColorStop(1,'#060a14');
  g.fillStyle=bgGrad;g.fillRect(0,0,GW,GH);
  // Stars
  bgStars.forEach(s=>{
    const fl=.5+.5*Math.sin(gFrame*.04+s.tw);
    g.beginPath();g.arc(s.x,s.y,s.r,0,Math.PI*2);
    g.fillStyle=`rgba(255,255,255,${s.a*fl})`;g.fill();
  });
  // Trail
  ship.trail.forEach((pt,i)=>{
    const al=(1-i/ship.trail.length)*0.25,r=(1-i/ship.trail.length)*4;
    g.beginPath();g.arc(pt.x,pt.y,r,0,Math.PI*2);g.fillStyle=`rgba(0,245,255,${al})`;g.fill();
  });
  // Particles
  parts.forEach(p=>{
    g.globalAlpha=Math.max(0,p.a);
    if(p.type==='ring'){g.beginPath();g.arc(p.x,p.y,p.r,0,Math.PI*2);g.strokeStyle=p.col;g.lineWidth=.8;g.stroke();}
    else{g.beginPath();g.arc(p.x,p.y,p.r,0,Math.PI*2);g.fillStyle=p.col;g.fill();}
  });g.globalAlpha=1;
  // Enemies
  enemies.forEach(e=>{
    const c=ECOLS[e.t];const pulse=.5+.5*Math.sin(e.pulse);
    g.save();g.translate(e.x,e.y);g.rotate(e.rot);
    g.shadowColor=c;g.shadowBlur=10+pulse*8;g.fillStyle=c;
    if(e.t===0){g.beginPath();g.moveTo(0,-e.h/2);g.lineTo(e.w/2,e.h/2);g.lineTo(0,e.h/3);g.lineTo(-e.w/2,e.h/2);g.closePath();g.fill();}
    else if(e.t===1){g.beginPath();g.moveTo(0,-e.h*.6);g.lineTo(e.w*.55,0);g.lineTo(0,e.h*.6);g.lineTo(-e.w*.55,0);g.closePath();g.fill();g.fillStyle='rgba(0,0,0,.35)';g.beginPath();g.arc(0,0,e.w*.2,0,Math.PI*2);g.fill();}
    else if(e.t===2){g.beginPath();g.arc(0,0,e.w/2,0,Math.PI*2);g.fill();g.fillStyle='rgba(0,0,0,.4)';g.beginPath();g.arc(-2,-2,e.w*.22,0,Math.PI*2);g.fill();}
    else{g.beginPath();g.moveTo(0,-e.h*.65);g.lineTo(e.w*.5,e.h*.2);g.lineTo(e.w*.3,e.h*.65);g.lineTo(-e.w*.3,e.h*.65);g.lineTo(-e.w*.5,e.h*.2);g.closePath();g.fill();g.fillStyle='rgba(255,255,255,.6)';g.beginPath();g.arc(0,0,e.w*.15,0,Math.PI*2);g.fill();}
    if(e.mhp>1){g.fillStyle='rgba(0,0,0,.6)';g.fillRect(-e.w/2-2,e.h/2+3,e.w+4,3);g.fillStyle=c;g.fillRect(-e.w/2-2,e.h/2+3,(e.w+4)*(e.hp/e.mhp),3);}
    g.shadowBlur=0;g.restore();
  });
  // Coins
  coins.forEach(c=>{
    g.save();g.translate(c.x,c.y);g.rotate(c.spin);
    g.shadowColor=COL.coin;g.shadowBlur=14;g.fillStyle=COL.coin;
    g.beginPath();g.arc(0,0,c.r,0,Math.PI*2);g.fill();
    g.fillStyle='rgba(255,255,255,.5)';g.beginPath();g.arc(-1.5,-1.5,c.r*.32,0,Math.PI*2);g.fill();
    g.strokeStyle='rgba(255,200,0,.6)';g.lineWidth=1;g.beginPath();g.arc(0,0,c.r+2,0,Math.PI*2);g.stroke();
    g.shadowBlur=0;g.restore();
  });
  // Powerups
  const PICONS=['❤️','🛡️','⚡'];const PCOLS=['#ff2d78','#00f5ff','#ffcc00'];
  pups.forEach(p=>{
    const pl=Math.sin(p.p)*2.8,pc=PCOLS[p.t];
    g.save();g.translate(p.x,p.y);g.shadowColor=pc;g.shadowBlur=18;
    g.strokeStyle=pc;g.lineWidth=1.5;g.beginPath();g.arc(0,0,p.r+pl,0,Math.PI*2);g.stroke();
    g.fillStyle=pc+'22';g.beginPath();g.arc(0,0,p.r+pl,0,Math.PI*2);g.fill();
    g.shadowBlur=0;g.font='11px serif';g.textAlign='center';g.textBaseline='middle';g.fillText(PICONS[p.t],0,.5);g.restore();
  });
  // Bullets
  bullets.forEach(b=>{
    g.save();const bc=b.dual?'#bf5fff':COL.bullet;
    g.shadowColor=bc;g.shadowBlur=8;
    const ang=Math.atan2(b.vy,b.vx);g.translate(b.x,b.y);g.rotate(ang);
    g.fillStyle=bc;g.beginPath();g.ellipse(0,0,b.r*2.5,b.r,0,0,Math.PI*2);g.fill();
    g.shadowBlur=0;g.restore();
  });
  // Ship
  if(ship&&(ship.inv===0||Math.floor(ship.inv/7)%2===0)){
    g.save();g.translate(ship.x,ship.y);
    if(shield){
      const sp2=Math.sin(gFrame*.12)*.5+.5;
      g.globalAlpha=.35+sp2*.35;g.shadowColor=COL.shield;g.shadowBlur=22;
      g.strokeStyle=COL.shield;g.lineWidth=Math.max(1,2-sp2*.5);
      g.beginPath();for(let i=0;i<6;i++){const a=Math.PI/3*i-Math.PI/6+gFrame*.015;g.lineTo(Math.cos(a)*24,Math.sin(a)*24);}g.closePath();g.stroke();
      g.fillStyle='rgba(0,245,255,0.05)';g.fill();g.globalAlpha=1;g.shadowBlur=0;
    }
    const egl=12+Math.sin(gFrame*.25)*4+(ship.tf<4?5:0);
    const eg=g.createRadialGradient(0,10,0,0,10,egl);
    eg.addColorStop(0,'rgba(255,140,0,.9)');eg.addColorStop(.5,'rgba(255,80,0,.4)');eg.addColorStop(1,'transparent');
    g.fillStyle=eg;g.beginPath();g.arc(0,10,egl,0,Math.PI*2);g.fill();
    const tl=9+Math.sin(gFrame*.3)*3+(ship.tf<4?4:0);
    g.fillStyle=COL.thruster;g.beginPath();g.moveTo(-5,9);g.lineTo(0,9+tl);g.lineTo(5,9);g.closePath();g.fill();
    g.fillStyle=COL.thruster2;g.beginPath();g.moveTo(-3,9);g.lineTo(0,9+tl*1.7);g.lineTo(3,9);g.closePath();g.fill();
    g.shadowColor=COL.shipGlow;g.shadowBlur=18;g.fillStyle=COL.shipBody;
    g.beginPath();g.moveTo(0,-15);g.lineTo(11,9);g.lineTo(0,5);g.lineTo(-11,9);g.closePath();g.fill();
    const cg=g.createRadialGradient(0,-4,0,0,-4,6);cg.addColorStop(0,'rgba(255,255,255,.9)');cg.addColorStop(1,'rgba(0,245,255,.3)');
    g.fillStyle=cg;g.beginPath();g.arc(0,-4,5.5,0,Math.PI*2);g.fill();
    g.fillStyle=COL.shipWing;
    g.beginPath();g.moveTo(-11,9);g.lineTo(-18,15);g.lineTo(-7,3);g.closePath();g.fill();
    g.beginPath();g.moveTo(11,9);g.lineTo(18,15);g.lineTo(7,3);g.closePath();g.fill();
    g.fillStyle=COL.shipBody;g.globalAlpha=.5;
    g.beginPath();g.arc(-18,15,2,0,Math.PI*2);g.fill();g.beginPath();g.arc(18,15,2,0,Math.PI*2);g.fill();
    g.globalAlpha=1;g.shadowBlur=0;g.restore();
  }
  // Combo
  if(combo>1&&comboT>0){
    const al=Math.min(1,comboT/25);g.globalAlpha=al;
    g.font='bold 13px Orbitron,monospace';g.textAlign='center';
    g.fillStyle=COL.coin;g.shadowColor=COL.coin;g.shadowBlur=12;
    g.fillText(`${combo}× COMBO`,ship.x,ship.y-32);g.shadowBlur=0;g.globalAlpha=1;
  }
  // Wave clear
  if(waveTextT>0){
    const al=Math.min(1,waveTextT/20)*Math.min(1,waveTextT/20);g.globalAlpha=al*.85;
    g.fillStyle='rgba(0,10,25,.6)';g.fillRect(GW/2-160,GH/2-24,320,44);
    g.font='bold 16px Orbitron,monospace';g.textAlign='center';g.fillStyle=COL.coin;
    g.shadowColor=COL.coin;g.shadowBlur=20;g.fillText(waveText,GW/2,GH/2+5);g.shadowBlur=0;g.globalAlpha=1;
  }
  if(enemies.length===0&&gWCD>35&&gWCD<80){
    g.globalAlpha=.5;g.font='11px Exo 2,sans-serif';g.textAlign='center';g.fillStyle='#4a6080';
    g.fillText('⚠  Next wave incoming…',GW/2,GH-10);g.globalAlpha=1;
  }
}

function endGame(){
  gRunning=false;
  if(gScore>gBest){gBest=gScore;document.getElementById('gBest').textContent=gBest.toLocaleString();}
  lbData[lbData.length-1].s=gScore;lbData[lbData.length-1].prev=gScore;
  lbData.sort((a,b)=>b.s-a.s);renderLB();
  const g=ctx2;
  g.fillStyle='rgba(2,3,8,.9)';g.fillRect(0,0,GW,GH);
  g.font='bold 22px Orbitron,monospace';g.textAlign='center';
  g.shadowColor='#ff2d78';g.shadowBlur=30;g.fillStyle='#ff2d78';
  g.fillText('GAME OVER',GW/2,GH/2-26);g.shadowBlur=0;
  g.font='12px Exo 2,sans-serif';g.fillStyle='#e8f4ff';
  g.fillText(`Score: ${gScore.toLocaleString()}  Wave: ${gWave}  Kills: ${totalKills}`,GW/2,GH/2+2);
  g.fillStyle='#00f5ff';g.font='11px Orbitron,monospace';
  g.fillText('RESTARTING IN 3 SECONDS…',GW/2,GH/2+26);
  let cd=3;
  const cdI=setInterval(()=>{
    cd--;g.clearRect(GW/2-130,GH/2+16,260,28);
    g.fillStyle='rgba(2,3,8,.9)';g.fillRect(GW/2-130,GH/2+16,260,28);
    g.font='11px Orbitron,monospace';g.textAlign='center';g.fillStyle='#00f5ff';
    g.fillText(`RESTARTING IN ${cd} SECOND${cd!==1?'S':''}…`,GW/2,GH/2+26);
    if(cd<=0){clearInterval(cdI);resetGame();}
  },1000);
}

function resetGame(){
  gScore=0;gLives=3;gWave=1;gWCD=0;gRunning=true;gFrame=0;
  bullets=[];enemies=[];coins=[];parts=[];pups=[];
  shield=false;shieldT=0;autoFireT=0;combo=0;comboT=0;
  aiPhase=0;aiPhaseT=0;waveText='';waveTextT=0;totalKills=0;
  initShip();spawnWave();updateGameUI();
  document.getElementById('gWave').textContent='1';
  document.getElementById('hWave').textContent='Wave 1';
  lbData[lbData.length-1].s=0;lbData[lbData.length-1].prev=0;renderLB();
}

function loop(){update();draw();requestAnimationFrame(loop);}

/* ── BOOT ── */
fit();
sizeCanvas();
initBG();initShip();spawnWave();
loop();
setTimeout(()=>addFeedMsg('msg'),500);
setTimeout(()=>addFeedMsg('msg'),1400);
setTimeout(()=>addFeedMsg('msg'),2400);
</script>
