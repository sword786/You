<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 Cosmic Voyage — Live Game Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020308;--bg2:#070b14;--bg3:#0d1220;--bg4:#111828;
  --cyan:#00f5ff;--pink:#ff2d78;--gold:#ffcc00;--green:#00ff88;--purple:#bf5fff;
  --text:#e8f4ff;--muted:#4a6080;--dim:#1a2840;
  --gcyan:rgba(0,245,255,0.15);--gpink:rgba(255,45,120,0.15);--ggold:rgba(255,204,0,0.2);
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;display:flex;flex-direction:column}

/* scanline overlay */
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:100}

/* starfield */
#sf{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.st{position:absolute;background:#fff;border-radius:50%;animation:twk linear infinite}
@keyframes twk{0%,100%{opacity:.04}50%{opacity:.55}}

/* neon grid floor */
#sf::after{content:'';position:absolute;bottom:0;left:0;right:0;height:180px;background:linear-gradient(to bottom,transparent,rgba(0,245,255,0.03));pointer-events:none}

.wrap{position:relative;z-index:1;display:grid;grid-template-rows:auto 1fr;height:100vh;padding:12px;gap:12px;max-width:1400px;margin:0 auto;width:100%}

/* ── HEADER ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;background:var(--bg2);border:1px solid rgba(0,245,255,0.12);border-radius:12px;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),var(--pink),transparent)}
.hdr-left{display:flex;align-items:center;gap:14px}
.game-title{font-family:'Orbitron',monospace;font-size:1.3rem;font-weight:900;background:linear-gradient(90deg,var(--cyan),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px}
.live-pill{display:flex;align-items:center;gap:6px;background:rgba(255,45,120,0.12);border:1px solid rgba(255,45,120,0.35);border-radius:100px;padding:4px 12px;font-size:10px;font-weight:600;letter-spacing:2px;color:var(--pink);text-transform:uppercase}
.lpulse{width:6px;height:6px;background:var(--pink);border-radius:50%;animation:lp 1s infinite;box-shadow:0 0 8px var(--pink)}
@keyframes lp{0%,100%{opacity:1;box-shadow:0 0 6px var(--pink)}50%{opacity:.3;box-shadow:0 0 16px var(--pink)}}
.hdr-stats{display:flex;gap:20px;align-items:center}
.hstat{text-align:center}
.hstat-val{font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:700;display:block}
.hstat-lbl{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.cv{color:var(--cyan)}
.pv{color:var(--pink)}
.gv{color:var(--gold)}
.grev{color:var(--green)}

/* ── BODY GRID ── */
.body-grid{display:grid;grid-template-columns:1fr 2.4fr 1fr;gap:12px;min-height:0}

/* ── PANELS ── */
.panel{background:var(--bg2);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;position:relative;border:1px solid var(--dim)}
.panel-header{padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--dim);flex-shrink:0}
.panel-title{font-family:'Orbitron',monospace;font-size:.72rem;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.panel-badge{font-size:9px;font-weight:600;letter-spacing:1px;padding:3px 9px;border-radius:100px;text-transform:uppercase}
.live-badge{background:rgba(0,255,136,0.1);color:var(--green);border:1px solid rgba(0,255,136,0.3)}
.panel-body{flex:1;overflow:hidden;padding:12px;min-height:0}

/* ── LEADERBOARD ── */
.lb-panel .panel-header{border-color:rgba(255,204,0,0.15)}
.lb-panel{border-color:rgba(255,204,0,0.15)}
.lb-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.lb-list{display:flex;flex-direction:column;gap:8px;height:100%;overflow:hidden}
.lb-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:var(--bg3);border:1px solid var(--dim);position:relative;overflow:hidden;transition:border-color .3s;flex-shrink:0}
.lb-item.first{border-color:rgba(255,204,0,0.4);background:rgba(255,204,0,0.04)}
.lb-item.second{border-color:rgba(192,192,192,0.3);background:rgba(192,192,192,0.03)}
.lb-item.third{border-color:rgba(205,127,50,0.3);background:rgba(205,127,50,0.03)}
.lb-item.you{border-color:rgba(0,245,255,0.4);background:rgba(0,245,255,0.04)}
.lb-glow{position:absolute;inset:0;opacity:0;transition:opacity .3s;background:linear-gradient(90deg,transparent,rgba(255,204,0,0.04),transparent)}
.lb-rank{font-family:'Orbitron',monospace;font-size:.95rem;font-weight:900;min-width:28px;text-align:center}
.lb-avatar{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;font-family:'Orbitron',monospace}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.lb-bar-wrap{height:2px;background:var(--dim);border-radius:100px;overflow:hidden}
.lb-bar{height:100%;border-radius:100px;transition:width .8s ease}
.lb-score{font-family:'Orbitron',monospace;font-size:.85rem;font-weight:700;text-align:right;flex-shrink:0}
.lb-delta{font-size:9px;font-weight:600;margin-top:2px;text-align:right}
.delta-up{color:var(--green)}
.delta-same{color:var(--muted)}

/* ── GAME PANEL ── */
.game-panel .panel-header{border-color:rgba(0,245,255,0.15)}
.game-panel{border-color:rgba(0,245,255,0.15)}
.game-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),var(--pink),var(--cyan),transparent)}
.game-panel .panel-body{padding:10px;display:flex;flex-direction:column;gap:8px}
#gc{display:block;width:100%;flex:1;border-radius:10px;background:#000;image-rendering:pixelated;min-height:0}
.game-hud-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;flex-shrink:0}
.ghud{background:var(--bg3);border:1px solid var(--dim);border-radius:8px;padding:8px 10px;text-align:center}
.ghud-val{font-family:'Orbitron',monospace;font-size:1rem;font-weight:700;display:block}
.ghud-lbl{font-size:8px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px}

/* ── VIEWER FEED ── */
.feed-panel .panel-header{border-color:rgba(191,95,255,0.2)}
.feed-panel{border-color:rgba(191,95,255,0.2)}
.feed-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--purple),transparent)}
.feed-panel .panel-body{padding:10px;display:flex;flex-direction:column;gap:0}
.feed-inner{display:flex;flex-direction:column;gap:6px;overflow:hidden;flex:1;position:relative}
.feed-inner::after{content:'';position:absolute;bottom:0;left:0;right:0;height:50px;background:linear-gradient(to top,var(--bg2),transparent);pointer-events:none}
.msg-item{display:flex;gap:8px;align-items:flex-start;padding:9px 10px;border-radius:9px;background:var(--bg3);border:1px solid var(--dim);animation:msgSlide .4s cubic-bezier(.22,.68,0,1.2);flex-shrink:0}
@keyframes msgSlide{from{opacity:0;transform:translateX(16px) scale(.97)}to{opacity:1;transform:translateX(0) scale(1)}}
.msg-av{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;font-family:'Orbitron',monospace}
.msg-content{flex:1;min-width:0}
.msg-user{font-size:10px;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:5px}
.msg-badge{font-size:7px;padding:1px 5px;border-radius:3px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.sub-badge{background:rgba(255,45,120,0.2);color:var(--pink);border:1px solid rgba(255,45,120,0.3)}
.vip-badge{background:rgba(255,204,0,0.15);color:var(--gold);border:1px solid rgba(255,204,0,0.3)}
.msg-text{font-size:11px;color:#8aa0c0;line-height:1.45}
.msg-time{font-size:8px;color:var(--muted);flex-shrink:0;margin-top:2px}

/* sub event */
.sub-event{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;background:rgba(255,45,120,0.07);border:1px solid rgba(255,45,120,0.25);animation:msgSlide .4s ease;flex-shrink:0}
.sub-event-icon{font-size:1.3rem}
.sub-event-text{flex:1;font-size:11px;color:var(--pink);font-weight:600}
.sub-event-sub{font-size:9px;color:var(--muted);margin-top:1px}

/* kill event */
.kill-event{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:9px;background:rgba(0,255,136,0.06);border:1px solid rgba(0,255,136,0.2);animation:msgSlide .4s ease;flex-shrink:0}
.kill-event-icon{font-size:1.1rem}
.kill-event-text{font-size:10px;color:var(--green);font-weight:600}
.kill-pts{font-family:'Orbitron',monospace;font-size:.7rem;color:var(--gold);margin-left:auto}

/* ── GAME OVER overlay ── */
#goOverlay{position:absolute;inset:10px;background:rgba(2,3,8,.92);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:20;display:none}
#goOverlay h2{font-family:'Orbitron',monospace;font-size:1.6rem;font-weight:900;color:var(--pink);text-shadow:0 0 30px var(--pink)}
#goOverlay p{font-size:13px;color:var(--muted)}
#goOverlay .go-score{font-family:'Orbitron',monospace;font-size:1.1rem;color:var(--gold)}
#goCountdown{font-family:'Orbitron',monospace;font-size:.85rem;color:var(--cyan)}
</style>
</head>
<body>
<div id="sf"></div>

<div class="wrap">

  <!-- HEADER -->
  <div class="header">
    <div class="hdr-left">
      <div class="game-title">⚡ COSMIC VOYAGE</div>
      <div class="live-pill"><div class="lpulse"></div>Live</div>
    </div>
    <div class="hdr-stats">
      <div class="hstat"><span class="hstat-val cv" id="hV">1,284</span><span class="hstat-lbl">👁 Viewers</span></div>
      <div class="hstat"><span class="hstat-val pv" id="hL">4,102</span><span class="hstat-lbl">❤️ Likes</span></div>
      <div class="hstat"><span class="hstat-val gv" id="hScore">0</span><span class="hstat-lbl">⭐ Score</span></div>
      <div class="hstat"><span class="hstat-val grev" id="hWave">Wave 1</span><span class="hstat-lbl">🌊 Current</span></div>
      <div class="hstat"><span class="hstat-val" style="color:var(--purple)" id="hUptime">00:00</span><span class="hstat-lbl">⏱ Uptime</span></div>
    </div>
  </div>

  <!-- BODY -->
  <div class="body-grid">

    <!-- LEADERBOARD -->
    <div class="panel lb-panel">
      <div class="panel-header">
        <span class="panel-title" style="color:var(--gold)">🏆 Leaderboard</span>
        <span class="panel-badge live-badge">Live</span>
      </div>
      <div class="panel-body">
        <div class="lb-list" id="lbList"></div>
      </div>
    </div>

    <!-- GAME -->
    <div class="panel game-panel">
      <div class="panel-header">
        <span class="panel-title" style="color:var(--cyan)">🎮 Cosmic Voyage — AI Pilot</span>
        <span class="panel-badge live-badge">Auto</span>
      </div>
      <div class="panel-body">
        <canvas id="gc"></canvas>
        <div class="game-hud-row">
          <div class="ghud"><span class="ghud-val" style="color:var(--gold)" id="gScore">0</span><span class="ghud-lbl">⭐ Score</span></div>
          <div class="ghud"><span class="ghud-val" style="color:var(--pink)" id="gLives">❤️❤️❤️</span><span class="ghud-lbl">Lives</span></div>
          <div class="ghud"><span class="ghud-val" style="color:var(--cyan)" id="gBest">0</span><span class="ghud-lbl">🏆 Best</span></div>
          <div class="ghud"><span class="ghud-val" style="color:var(--green)" id="gWave">1</span><span class="ghud-lbl">🌊 Wave</span></div>
        </div>
      </div>
    </div>

    <!-- VIEWER FEED -->
    <div class="panel feed-panel">
      <div class="panel-header">
        <span class="panel-title" style="color:var(--purple)">💬 Live Feed</span>
        <span class="panel-badge live-badge">Live</span>
      </div>
      <div class="panel-body">
        <div class="feed-inner" id="feedInner"></div>
      </div>
    </div>

  </div>
</div>

<script>
/* ══ STARS ══ */
const sf=document.getElementById('sf');
for(let i=0;i<120;i++){
  const s=document.createElement('div');s.className='st';
  const z=Math.random()*1.8+.4;
  s.style.cssText=`width:${z}px;height:${z}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-duration:${1.8+Math.random()*4.5}s;animation-delay:${Math.random()*6}s`;
  sf.appendChild(s);
}

/* ══ LIVE STATS ══ */
let viewers=1284,likes=4102,uptimeSec=0;
setInterval(()=>{
  viewers+=Math.floor(Math.random()*7)-2;viewers=Math.max(900,viewers);
  likes+=Math.floor(Math.random()*4);
  document.getElementById('hV').textContent=viewers.toLocaleString();
  document.getElementById('hL').textContent=likes.toLocaleString();
},3200);
setInterval(()=>{
  uptimeSec++;
  const m=String(Math.floor(uptimeSec/60)).padStart(2,'0'),s=String(uptimeSec%60).padStart(2,'0');
  document.getElementById('hUptime').textContent=`${m}:${s}`;
},1000);

/* ══ LEADERBOARD ══ */
const LB_COLORS=[
  {bg:'rgba(255,204,0,0.12)',border:'rgba(255,204,0,0.4)',bar:'#ffcc00',text:'#ffcc00',av:'rgba(255,204,0,0.2)'},
  {bg:'rgba(192,192,192,0.08)',border:'rgba(192,192,192,0.3)',bar:'#c0c0c0',text:'#c0c0c0',av:'rgba(192,192,192,0.15)'},
  {bg:'rgba(205,127,50,0.08)',border:'rgba(205,127,50,0.3)',bar:'#cd7f32',text:'#cd7f32',av:'rgba(205,127,50,0.15)'},
  {bg:'rgba(0,245,255,0.06)',border:'rgba(0,245,255,0.25)',bar:'#00f5ff',text:'#00f5ff',av:'rgba(0,245,255,0.12)'},
  {bg:'rgba(191,95,255,0.06)',border:'rgba(191,95,255,0.25)',bar:'#bf5fff',text:'#bf5fff',av:'rgba(191,95,255,0.12)'},
  {bg:'rgba(0,255,136,0.05)',border:'rgba(0,255,136,0.2)',bar:'#00ff88',text:'#00ff88',av:'rgba(0,255,136,0.1)'},
  {bg:'rgba(255,45,120,0.05)',border:'rgba(255,45,120,0.2)',bar:'#ff2d78',text:'#ff2d78',av:'rgba(255,45,120,0.1)'},
  {bg:'rgba(72,119,255,0.05)',border:'rgba(72,119,255,0.2)',bar:'#4877ff',text:'#4877ff',av:'rgba(72,119,255,0.1)'},
];
const LB_RANKS=['🥇','🥈','🥉','4','5','6','7','8'];
let lbData=[
  {n:'StarKiller_X',s:52840,prev:52840},
  {n:'NeonViper',s:41200,prev:41200},
  {n:'CosmicAce',s:33760,prev:33760},
  {n:'VoidHunter',s:28490,prev:28490},
  {n:'PixelStorm',s:21330,prev:21330},
  {n:'GhostPilot',s:17880,prev:17880},
  {n:'NovaBreach',s:12540,prev:12540},
  {n:'AI PILOT',s:0,prev:0,isYou:true},
];
function renderLB(){
  const ul=document.getElementById('lbList');ul.innerHTML='';
  const max=Math.max(...lbData.map(e=>e.s),1);
  lbData.sort((a,b)=>b.s-a.s);
  lbData.forEach((e,i)=>{
    const c=LB_COLORS[i%LB_COLORS.length];
    const pct=Math.round(e.s/max*100);
    const delta=e.s-e.prev;
    const deltaStr=delta>0?`+${delta.toLocaleString()}`:(delta<0?delta.toLocaleString():'—');
    const deltaClass=delta>0?'delta-up':'delta-same';
    const li=document.createElement('li');li.className='lb-item';
    if(i===0)li.classList.add('first');
    else if(i===1)li.classList.add('second');
    else if(i===2)li.classList.add('third');
    if(e.isYou)li.classList.add('you');
    li.style.cssText=`background:${c.bg};border-color:${c.border}`;
    li.innerHTML=`
      <span class="lb-rank" style="color:${c.text}">${LB_RANKS[i]||i+1}</span>
      <div class="lb-avatar" style="background:${c.av};color:${c.text}">${e.n.slice(0,2).toUpperCase()}</div>
      <div class="lb-info">
        <div class="lb-name">${e.n}${e.isYou?' 🤖':''}</div>
        <div class="lb-bar-wrap"><div class="lb-bar" style="width:${pct}%;background:${c.bar}"></div></div>
      </div>
      <div>
        <div class="lb-score" style="color:${c.text}">${e.s.toLocaleString()}</div>
        <div class="lb-delta ${deltaClass}">${deltaStr}</div>
      </div>`;
    ul.appendChild(li);
  });
}
function tickLB(){
  lbData.forEach((e,i)=>{if(!e.isYou){e.prev=e.s;e.s+=Math.floor(Math.random()*220);}});
  renderLB();
}
renderLB();
setInterval(tickLB,4000);

/* ══ VIEWER FEED ══ */
const NAMES=['StarViper','NeonSoul','CosmicK','PixelWulf','GhostAce','VoidMind','NovaFire','ByteRacer','SkyBreak','HexDawn','CyberZen','LunarEdge','PulseX99','OrbitalQ','IonDrift'];
const MSGS=[
  ['💜 That dodge was insane!',false],
  ['🔥 The AI never misses',false],
  ['🎮 This game is so satisfying to watch',false],
  ['⭐ New high score incoming??',false],
  ['😱 Wave 7 already wtf',false],
  ['🏆 StarKiller about to be dethroned lol',false],
  ['GG AI pilot is carrying rn',false],
  ['the combo on that was clean asf 🎯',false],
  ['👾 love this stream every day',false],
  ['LETS GOOOO wave clear!!',false],
  ['🌊 how are those enemy patterns so smooth',false],
  ['subbed for this energy honestly 🔔',true],
  ['❤️❤️❤️',false],
  ['that shield save was PERFECT',false],
  ['the sound design is so clean',false],
  ['💎 this is top tier content',true],
  ['🚀 watching the score counter go brrr',false],
  ['I showed my friends they\'re hooked now too',false],
  ['the particles on explosion 🤌',false],
  ['wave boss when?? 👀',false],
];
const BADGE_NAMES=['ModBot','StreamPro','VIP_User'];
let feedItems=[];
let msgTime=0;
function fmtTime(){const n=new Date();return n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');}
function addFeedMsg(type='msg',extra={}){
  const feed=document.getElementById('feedInner');
  let el=document.createElement('div');
  if(type==='msg'){
    const [msg,isSub]=MSGS[Math.floor(Math.random()*MSGS.length)];
    const name=NAMES[Math.floor(Math.random()*NAMES.length)];
    const ci=Math.floor(Math.random()*LB_COLORS.length);
    const c=LB_COLORS[ci];
    const isVip=Math.random()<.12;
    el.className='msg-item';
    el.style.cssText=`background:${c.bg};border-color:${c.border}`;
    el.innerHTML=`<div class="msg-av" style="background:${c.av};color:${c.text}">${name.slice(0,2).toUpperCase()}</div>
      <div class="msg-content">
        <div class="msg-user" style="color:${c.text}">${name}${isSub?'<span class="msg-badge sub-badge">SUB</span>':''}${isVip?'<span class="msg-badge vip-badge">VIP</span>':''}</div>
        <div class="msg-text">${msg}</div>
      </div>
      <div class="msg-time">${fmtTime()}</div>`;
  } else if(type==='sub'){
    el.className='sub-event';
    el.innerHTML=`<div class="sub-event-icon">🔔</div><div class="sub-event-text">${extra.name} just subscribed!<div class="sub-event-sub">Welcome to the community ✨</div></div>`;
  } else if(type==='kill'){
    el.className='kill-event';
    el.innerHTML=`<div class="kill-event-icon">${extra.icon}</div><div class="kill-event-text">AI destroyed ${extra.name}</div><span class="kill-pts">+${extra.pts}</span>`;
  }
  feed.insertBefore(el,feed.firstChild);
  feedItems.push(el);
  if(feedItems.length>14)feed.removeChild(feedItems.shift());
}
setInterval(()=>addFeedMsg('msg'),2000);
setInterval(()=>{if(Math.random()<.18)addFeedMsg('sub',{name:NAMES[Math.floor(Math.random()*NAMES.length)]});},6000);

/* ══ AUDIO ══ */
let AC=null;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function tone(f,t,dur,g,d=0){setTimeout(()=>{try{const c=getAC();const o=c.createOscillator(),gn=c.createGain();o.frequency.value=f;o.type=t;gn.gain.value=g;gn.gain.linearRampToValueAtTime(0,c.currentTime+dur);o.connect(gn);gn.connect(c.destination);o.start();o.stop(c.currentTime+dur);}catch(e){}},d);}
function sfxCoin(){tone(880,'sine',.08,.25);tone(1100,'sine',.08,.18,45);}
function sfxHit(){try{const c=getAC();const b=c.createBuffer(1,c.sampleRate*.15,c.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);const s=c.createBufferSource();s.buffer=b;const g=c.createGain();g.gain.value=.5;s.connect(g);g.connect(c.destination);s.start();}catch(e){}}
function sfxWave(){[523,659,784,1047].forEach((f,i)=>tone(f,'square',.14,.18,i*110));}
function sfxPow(){tone(440,'sine',.3,.22);tone(660,'sine',.25,.18,80);}

/* ══════════════════════════════════════════════════
   🎮  COSMIC VOYAGE — FULL GAME ENGINE
══════════════════════════════════════════════════ */
const cv=document.getElementById('gc');
const ctx=cv.getContext('2d');
let GW,GH;

function resizeCanvas(){
  const body=cv.parentElement;
  GW=body.clientWidth-20;
  const hud=document.querySelector('.game-hud-row');
  GH=body.clientHeight-hud.offsetHeight-20-8-24;
  cv.width=GW;cv.height=GH;
}

/* Palettes */
const COL={
  bg:'#020308',
  shipBody:'#00f5ff',shipGlow:'rgba(0,245,255,0.4)',
  shipWing:'rgba(0,245,255,0.3)',shipCore:'#fff',
  thruster:'#ff8c00',thruster2:'rgba(255,140,0,0.3)',
  bullet:'#00f5ff',bulletGlow:'rgba(0,245,255,0.5)',
  e0:'#ff2d78',e0g:'rgba(255,45,120,0.4)',
  e1:'#ffcc00',e1g:'rgba(255,204,0,0.4)',
  e2:'#00ff88',e2g:'rgba(0,255,136,0.4)',
  e3:'#bf5fff',e3g:'rgba(191,95,255,0.4)',
  coin:'#ffcc00',coinG:'rgba(255,204,0,0.5)',
  shield:'#00f5ff',shieldG:'rgba(0,245,255,0.25)',
  px1:'#ff2d78',px2:'#00f5ff',px3:'#ffcc00',px4:'#00ff88',
  star:'rgba(255,255,255,',
};
const ECOLS=[COL.e0,COL.e1,COL.e2,COL.e3];
const EGLOWS=[COL.e0g,COL.e1g,COL.e2g,COL.e3g];
const PXCOLS=[COL.px1,COL.px2,COL.px3,COL.px4];

/* State */
let gScore=0,gLives=3,gWave=1,gBest=0,gFrame=0,gRunning=true,gWCD=0;
let ship,bullets=[],enemies=[],coins=[],parts=[],pups=[],bgStars=[];
let shield=false,shieldT=0;
let autoFireT=0,combo=0,comboT=0;
let aiTargX,aiTargY,aiPhase=0,aiPhaseT=0;
let waveText='',waveTextT=0;
let totalKills=0;
const ENEMY_NAMES=['Wraith','Phantom','Shadow','Specter','Void','Nova','Pulse','Echo'];

function initBG(){
  bgStars=[];
  for(let i=0;i<140;i++){
    bgStars.push({
      x:Math.random()*GW,y:Math.random()*GH,
      r:.2+Math.random()*.9,
      spd:.2+Math.random()*.9,
      a:.15+Math.random()*.7,
      twinkleOffset:Math.random()*Math.PI*2
    });
  }
}
function initShip(){
  aiTargX=GW/2;aiTargY=GH*.8;
  ship={x:GW/2,y:GH*.82,inv:0,tf:0,trail:[]};
}

/* Enemy types:
   0 = fast triangle (pink)
   1 = diamond tanky (gold)
   2 = circle swarm (green)
   3 = boss-lite zigzag (purple)
*/
function spawnWave(){
  const base=6+gWave*2;
  const count=Math.min(base,22);
  for(let i=0;i<count;i++){
    const r=Math.random();
    const t=gWave<2?0:(r<.4?0:r<.65?1:r<.82?2:3);
    const col=Math.random()*6;
    let x,y;
    if(col<2){x=60+(i%7)*(GW-120)/6;y=-35-(Math.floor(i/7)*55);}
    else if(col<4){x=GW/2+Math.cos(i/count*Math.PI*2)*Math.min(GW*.38,180);y=-60-i*20;}
    else{x=i%2===0?70:GW-70;y=-30-i*35;}
    const spd=.55+gWave*.06+Math.random()*.4;
    enemies.push({
      x,y,t,
      w:t===3?28:t===1?22:18,
      h:t===3?26:t===1?20:16,
      hp:t===3?4:t===1?2:1,
      mhp:t===3?4:t===1?2:1,
      vx:(Math.random()-.5)*.5,vy:spd,
      rot:0,rs:(Math.random()-.5)*.055,
      zz:t===3||Math.random()>.6,zt:0,
      pulse:Math.random()*Math.PI*2,
      dc:Math.random()<.4,
    });
  }
}

function spawnCoin(x,y){
  coins.push({x,y,vx:(Math.random()-.5)*1.6,vy:-1.8+Math.random()*.5,r:5,lf:220,col:false,spin:0});
}

function burst(x,y,cols,n=10){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=.8+Math.random()*3.5;
    parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:1.2+Math.random()*2.8,lf:30+Math.random()*28,ml:55,col:cols[Math.floor(Math.random()*cols.length)],a:1,type:Math.random()<.4?'ring':'dot'});
  }
}

function spawnPup(x,y){
  if(Math.random()<.16)pups.push({x,y,vy:.65,t:Math.floor(Math.random()*3),r:10,lf:300,p:0});
}

/* ── AI ── */
function updateAI(){
  aiPhaseT--;
  if(aiPhaseT<=0){
    aiPhase=Math.floor(Math.random()*6);
    aiPhaseT=50+Math.floor(Math.random()*80);
    if(aiPhase===0){aiTargX=GW*.15;aiTargY=GH*.78;}
    else if(aiPhase===1){aiTargX=GW*.85;aiTargY=GH*.78;}
    else if(aiPhase===2){aiTargX=GW*.5;aiTargY=GH*.85;}
    else if(aiPhase===3){
      if(enemies.length){const ne=enemies.reduce((a,b)=>b.y>a.y?b:a);aiTargX=ne.x;aiTargY=GH*.78;}
    } else if(aiPhase===4){
      if(coins.length){const nc=coins.reduce((a,b)=>Math.hypot(b.x-ship.x,b.y-ship.y)<Math.hypot(a.x-ship.x,a.y-ship.y)?b:a);aiTargX=nc.x;aiTargY=nc.y;}
      else{aiTargX=GW/2;aiTargY=GH*.78;}
    } else {
      // Zigzag sweep
      aiTargX=Math.random()<.5?GW*.2:GW*.8;aiTargY=GH*.75;
    }
  }
  // Emergency dodge
  enemies.forEach(e=>{if(e.y>GH*.45&&Math.abs(e.x-ship.x)<50){aiTargX+=ship.x<GW/2?80:-80;}});
  aiTargX=Math.max(30,Math.min(GW-30,aiTargX));
  const dx=aiTargX-ship.x,dy=aiTargY-ship.y;
  const dist=Math.hypot(dx,dy);
  const spd=2.6+gWave*.08;
  if(dist>1.5){ship.x+=dx/dist*Math.min(dist,spd);ship.y+=dy/dist*Math.min(dist,spd*.75);}
  ship.x=Math.max(20,Math.min(GW-20,ship.x));
  ship.y=Math.max(GH*.52,Math.min(GH-16,ship.y));
  // Store trail
  ship.trail.unshift({x:ship.x,y:ship.y});
  if(ship.trail.length>18)ship.trail.pop();
}

/* ── UPDATE ── */
function update(){
  if(!gRunning)return;
  gFrame++;
  // Stars scroll
  bgStars.forEach(s=>{s.y+=s.spd;if(s.y>GH){s.y=-2;s.x=Math.random()*GW;}});
  updateAI();
  ship.inv=Math.max(0,ship.inv-1);
  ship.tf=(ship.tf+1)%8;
  // Auto fire
  autoFireT++;
  const fr=Math.max(7,15-gWave);
  if(autoFireT>=fr){
    autoFireT=0;
    if(enemies.length){
      const targets=enemies.slice().sort((a,b)=>b.y-a.y).slice(0,2);
      targets.forEach((ne,idx)=>{
        const ddx=ne.x-ship.x,ddy=ne.y-ship.y,mg=Math.hypot(ddx,ddy)||1,sp=10;
        bullets.push({x:ship.x+(idx===1?8:-8),y:ship.y-12,vx:ddx/mg*sp,vy:ddy/mg*sp,r:2.5+idx*.5,lf:60,dual:idx===1});
        if(shield&&idx===0)bullets.push({x:ship.x+14,y:ship.y-6,vx:ddx/mg*sp*.85+.5,vy:ddy/mg*sp*.9,r:2,lf:52,dual:true});
      });
    } else {
      bullets.push({x:ship.x-4,y:ship.y-12,vx:-.2,vy:-10,r:2.5,lf:55,dual:false});
      bullets.push({x:ship.x+4,y:ship.y-12,vx:.2,vy:-10,r:2.5,lf:55,dual:true});
    }
  }
  bullets=bullets.filter(b=>{b.x+=b.vx;b.y+=b.vy;b.lf--;return b.lf>0&&b.y>-10&&b.y<GH+10&&b.x>-10&&b.x<GW+10;});
  enemies.forEach(e=>{e.x+=e.vx;e.y+=e.vy;e.rot+=e.rs;e.pulse+=.07;if(e.zz){e.zt++;e.x+=Math.sin(e.zt*.065)*1.2;}if(e.x<16||e.x>GW-16)e.vx*=-1;});
  // Bullet-enemy collision
  outer:for(let bi=bullets.length-1;bi>=0;bi--){
    const b=bullets[bi];
    for(let ei=enemies.length-1;ei>=0;ei--){
      const e=enemies[ei];
      if(Math.hypot(b.x-e.x,b.y-e.y)<(e.w*.5+b.r)){
        bullets.splice(bi,1);e.hp--;
        burst(b.x,b.y,[ECOLS[e.t],'#fff'],5);
        if(e.hp<=0){
          const cc=[ECOLS[e.t],PXCOLS[1],'#fff'];
          burst(e.x,e.y,cc,16);
          sfxCoin();totalKills++;
          const pts=10*(e.t+1)*(1+Math.floor(gWave/2))*(combo>1?combo:1);
          gScore+=pts;combo++;comboT=60;
          if(e.dc)spawnCoin(e.x,e.y);
          spawnPup(e.x,e.y);
          // Feed kill event
          addFeedMsg('kill',{icon:['💥','⚡','🌟','👾'][e.t],name:ENEMY_NAMES[Math.floor(Math.random()*ENEMY_NAMES.length)],pts});
          enemies.splice(ei,1);
          updateGameUI();
          lbData[lbData.length-1].prev=lbData[lbData.length-1].s;
          lbData[lbData.length-1].s=gScore;
          renderLB();
        }
        continue outer;
      }
    }
  }
  // Ship collision
  if(ship.inv===0){
    for(let ei=enemies.length-1;ei>=0;ei--){
      const e=enemies[ei];
      if(e.y>GH-6||(Math.hypot(e.x-ship.x,e.y-ship.y)<(e.w*.45+9)&&!shield)){
        sfxHit();burst(e.x,e.y,[ECOLS[e.t],COL.px1,'#fff'],12);
        enemies.splice(ei,1);gLives--;ship.inv=90;combo=0;
        updateGameUI();if(gLives<=0){endGame();return;}
        break;
      }
    }
  }
  // Coins
  for(let ci=coins.length-1;ci>=0;ci--){
    const c=coins[ci];c.x+=c.vx;c.y+=c.vy;c.vy+=.05;c.lf--;c.spin+=.1;
    if(!c.col&&Math.hypot(c.x-ship.x,c.y-ship.y)<18){
      c.col=true;const pts=5*(1+Math.floor(gWave/3));gScore+=pts;
      burst(c.x,c.y,[COL.coin,'#fff'],6);updateGameUI();
      lbData[lbData.length-1].s=gScore;
    }
    if(c.lf<=0||c.col)coins.splice(ci,1);
  }
  // Powerups
  for(let pi=pups.length-1;pi>=0;pi--){
    const p=pups[pi];p.y+=p.vy;p.lf--;p.p+=.1;
    if(Math.hypot(p.x-ship.x,p.y-ship.y)<18){
      if(p.t===0){gLives=Math.min(6,gLives+1);}
      else if(p.t===1){shield=true;shieldT=200;}
      else{gScore+=80;}
      sfxPow();burst(p.x,p.y,[COL.coin,'#fff',COL.shipBody],14);
      pups.splice(pi,1);updateGameUI();continue;
    }
    if(p.y>GH||p.lf<=0)pups.splice(pi,1);
  }
  if(shield){shieldT--;if(shieldT<=0)shield=false;}
  if(comboT>0){comboT--;if(comboT<=0)combo=0;}
  parts=parts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=.92;p.vy*=.92;p.lf--;p.a=p.lf/p.ml;return p.lf>0;});
  if(waveTextT>0)waveTextT--;
  // Wave end
  if(enemies.length===0){
    gWCD++;
    if(gWCD>80){
      gWCD=0;gWave++;gBest=Math.max(gBest,gScore);
      document.getElementById('gWave').textContent=gWave;
      document.getElementById('hWave').textContent=`Wave ${gWave}`;
      document.getElementById('gBest').textContent=gBest.toLocaleString();
      waveText=`⭐ WAVE ${gWave-1} CLEARED!`;waveTextT=100;
      spawnWave();sfxWave();
      burst(GW/2,GH/2,[COL.shipBody,COL.coin,COL.px1,'#fff'],28);
    }
  }
}

function updateGameUI(){
  document.getElementById('gScore').textContent=gScore.toLocaleString();
  document.getElementById('hScore').textContent=gScore.toLocaleString();
  const hearts='❤️'.repeat(Math.max(0,gLives));
  document.getElementById('gLives').textContent=hearts||'💀';
  if(gScore>gBest){gBest=gScore;document.getElementById('gBest').textContent=gBest.toLocaleString();}
}

/* ── DRAW ── */
function draw(){
  const g=ctx;
  g.clearRect(0,0,GW,GH);
  // BG gradient
  const bgGrad=g.createLinearGradient(0,0,0,GH);
  bgGrad.addColorStop(0,'#020308');bgGrad.addColorStop(1,'#060a14');
  g.fillStyle=bgGrad;g.fillRect(0,0,GW,GH);
  // Stars
  bgStars.forEach(s=>{
    const flicker=.5+.5*Math.sin(gFrame*.04+s.twinkleOffset);
    g.beginPath();g.arc(s.x,s.y,s.r,0,Math.PI*2);
    g.fillStyle=`rgba(255,255,255,${s.a*flicker})`;g.fill();
  });
  // Ship trail
  ship.trail.forEach((pt,i)=>{
    const al=(1-i/ship.trail.length)*0.25;
    const r=(1-i/ship.trail.length)*4;
    g.beginPath();g.arc(pt.x,pt.y,r,0,Math.PI*2);
    g.fillStyle=`rgba(0,245,255,${al})`;g.fill();
  });
  // Particles
  parts.forEach(p=>{
    g.globalAlpha=Math.max(0,p.a);
    if(p.type==='ring'){g.beginPath();g.arc(p.x,p.y,p.r,0,Math.PI*2);g.strokeStyle=p.col;g.lineWidth=.8;g.stroke();}
    else{g.beginPath();g.arc(p.x,p.y,p.r,0,Math.PI*2);g.fillStyle=p.col;g.fill();}
  });g.globalAlpha=1;
  // Enemies
  enemies.forEach(e=>{
    const c=ECOLS[e.t],gl=EGLOWS[e.t];
    g.save();g.translate(e.x,e.y);g.rotate(e.rot);
    const pulse=.5+.5*Math.sin(e.pulse);
    g.shadowColor=c;g.shadowBlur=10+pulse*8;
    g.fillStyle=c;
    if(e.t===0){// Fast triangle
      g.beginPath();g.moveTo(0,-e.h/2);g.lineTo(e.w/2,e.h/2);g.lineTo(0,e.h/3);g.lineTo(-e.w/2,e.h/2);g.closePath();g.fill();
    } else if(e.t===1){// Diamond
      g.beginPath();g.moveTo(0,-e.h*.6);g.lineTo(e.w*.55,0);g.lineTo(0,e.h*.6);g.lineTo(-e.w*.55,0);g.closePath();g.fill();
      g.fillStyle='rgba(0,0,0,.35)';g.beginPath();g.arc(0,0,e.w*.2,0,Math.PI*2);g.fill();
    } else if(e.t===2){// Circle swarm
      g.beginPath();g.arc(0,0,e.w/2,0,Math.PI*2);g.fill();
      g.fillStyle='rgba(0,0,0,.4)';g.beginPath();g.arc(-2,-2,e.w*.22,0,Math.PI*2);g.fill();
    } else {// Boss-lite
      g.beginPath();g.moveTo(0,-e.h*.65);g.lineTo(e.w*.5,e.h*.2);g.lineTo(e.w*.3,e.h*.65);g.lineTo(-e.w*.3,e.h*.65);g.lineTo(-e.w*.5,e.h*.2);g.closePath();g.fill();
      // Core
      g.fillStyle='rgba(255,255,255,.6)';g.beginPath();g.arc(0,0,e.w*.15,0,Math.PI*2);g.fill();
    }
    // HP bar
    if(e.mhp>1){
      g.fillStyle='rgba(0,0,0,.6)';g.fillRect(-e.w/2-2,e.h/2+3,e.w+4,3);
      g.fillStyle=c;g.fillRect(-e.w/2-2,e.h/2+3,(e.w+4)*(e.hp/e.mhp),3);
    }
    g.shadowBlur=0;g.restore();
  });
  // Coins
  coins.forEach(c=>{
    g.save();g.translate(c.x,c.y);g.rotate(c.spin);
    g.shadowColor=COL.coin;g.shadowBlur=14;
    g.fillStyle=COL.coin;g.beginPath();g.arc(0,0,c.r,0,Math.PI*2);g.fill();
    g.fillStyle='rgba(255,255,255,.5)';g.beginPath();g.arc(-1.5,-1.5,c.r*.32,0,Math.PI*2);g.fill();
    g.strokeStyle='rgba(255,200,0,.6)';g.lineWidth=1;g.beginPath();g.arc(0,0,c.r+2,0,Math.PI*2);g.stroke();
    g.shadowBlur=0;g.restore();
  });
  // Powerups
  const PICONS=['❤️','🛡️','⚡'];const PCOLS=['#ff2d78','#00f5ff','#ffcc00'];
  pups.forEach(p=>{
    const pl=Math.sin(p.p)*2.8;const pc=PCOLS[p.t];
    g.save();g.translate(p.x,p.y);
    g.shadowColor=pc;g.shadowBlur=18;
    g.strokeStyle=pc;g.lineWidth=1.5;
    g.beginPath();g.arc(0,0,p.r+pl,0,Math.PI*2);g.stroke();
    g.fillStyle=pc+'22';g.beginPath();g.arc(0,0,p.r+pl,0,Math.PI*2);g.fill();
    g.shadowBlur=0;g.font='11px serif';g.textAlign='center';g.textBaseline='middle';
    g.fillText(PICONS[p.t],0,0.5);g.restore();
  });
  // Bullets
  bullets.forEach(b=>{
    g.save();
    const bc=b.dual?'#bf5fff':COL.bullet;
    g.shadowColor=bc;g.shadowBlur=8;
    // elongated bullet
    const ang=Math.atan2(b.vy,b.vx);
    g.translate(b.x,b.y);g.rotate(ang);
    g.fillStyle=bc;g.beginPath();g.ellipse(0,0,b.r*2.5,b.r,0,0,Math.PI*2);g.fill();
    g.shadowBlur=0;g.restore();
  });
  // Ship
  if(ship&&(ship.inv===0||Math.floor(ship.inv/7)%2===0)){
    g.save();g.translate(ship.x,ship.y);
    // Shield
    if(shield){
      const sp2=Math.sin(gFrame*.12)*.5+.5;
      g.globalAlpha=.35+sp2*.35;g.shadowColor=COL.shield;g.shadowBlur=22;
      const sc=Math.max(1,2-sp2*.5);g.strokeStyle=COL.shield;g.lineWidth=sc;
      // Hexagon shield
      g.beginPath();for(let i=0;i<6;i++){const a=Math.PI/3*i-Math.PI/6+gFrame*.015;g.lineTo(Math.cos(a)*24,Math.sin(a)*24);}g.closePath();g.stroke();
      g.fillStyle='rgba(0,245,255,0.05)';g.fill();
      g.globalAlpha=1;g.shadowBlur=0;
    }
    // Engine glow
    const egl=12+Math.sin(gFrame*.25)*4+(ship.tf<4?5:0);
    const eg=g.createRadialGradient(0,10,0,0,10,egl);
    eg.addColorStop(0,'rgba(255,140,0,.9)');eg.addColorStop(.5,'rgba(255,80,0,.4)');eg.addColorStop(1,'transparent');
    g.fillStyle=eg;g.beginPath();g.arc(0,10,egl,0,Math.PI*2);g.fill();
    // Thruster flame
    const tl=9+Math.sin(gFrame*.3)*3+(ship.tf<4?4:0);
    g.fillStyle=COL.thruster;g.beginPath();g.moveTo(-5,9);g.lineTo(0,9+tl);g.lineTo(5,9);g.closePath();g.fill();
    g.fillStyle=COL.thruster2;g.beginPath();g.moveTo(-3,9);g.lineTo(0,9+tl*1.7);g.lineTo(3,9);g.closePath();g.fill();
    // Body
    g.shadowColor=COL.shipGlow;g.shadowBlur=18;
    g.fillStyle=COL.shipBody;
    g.beginPath();g.moveTo(0,-15);g.lineTo(11,9);g.lineTo(0,5);g.lineTo(-11,9);g.closePath();g.fill();
    // Cockpit
    const cg=g.createRadialGradient(0,-4,0,0,-4,6);cg.addColorStop(0,'rgba(255,255,255,.9)');cg.addColorStop(1,'rgba(0,245,255,.3)');
    g.fillStyle=cg;g.beginPath();g.arc(0,-4,5.5,0,Math.PI*2);g.fill();
    // Wings
    g.fillStyle=COL.shipWing;
    g.beginPath();g.moveTo(-11,9);g.lineTo(-18,15);g.lineTo(-7,3);g.closePath();g.fill();
    g.beginPath();g.moveTo(11,9);g.lineTo(18,15);g.lineTo(7,3);g.closePath();g.fill();
    // Wing tips lit
    g.fillStyle=COL.shipBody;g.globalAlpha=.5;
    g.beginPath();g.arc(-18,15,2,0,Math.PI*2);g.fill();
    g.beginPath();g.arc(18,15,2,0,Math.PI*2);g.fill();
    g.globalAlpha=1;g.shadowBlur=0;g.restore();
  }
  // Combo
  if(combo>1&&comboT>0){
    const al=Math.min(1,comboT/25);g.globalAlpha=al;
    g.font=`bold 13px Orbitron,monospace`;g.textAlign='center';
    g.fillStyle=COL.coin;g.shadowColor=COL.coin;g.shadowBlur=12;
    g.fillText(`${combo}× COMBO`,ship.x,ship.y-32);
    g.shadowBlur=0;g.globalAlpha=1;
  }
  // Wave clear text
  if(waveTextT>0){
    const al=Math.min(1,waveTextT/20)*Math.min(1,(waveTextT)/20);g.globalAlpha=al*.85;
    g.fillStyle='rgba(0,10,25,.6)';g.fillRect(GW/2-160,GH/2-24,320,44);
    g.font='bold 16px Orbitron,monospace';g.textAlign='center';g.fillStyle=COL.coin;
    g.shadowColor=COL.coin;g.shadowBlur=20;g.fillText(waveText,GW/2,GH/2+5);
    g.shadowBlur=0;g.globalAlpha=1;
  }
  // Incoming text
  if(enemies.length===0&&gWCD>35&&gWCD<80){
    g.globalAlpha=.5;g.font='11px Exo 2,sans-serif';g.textAlign='center';g.fillStyle='#4a6080';
    g.fillText('⚠  Next wave incoming…',GW/2,GH-10);g.globalAlpha=1;
  }
}

function endGame(){
  gRunning=false;
  if(gScore>gBest){gBest=gScore;document.getElementById('gBest').textContent=gBest.toLocaleString();}
  lbData[lbData.length-1].s=gScore;lbData[lbData.length-1].prev=gScore;
  lbData.sort((a,b)=>b.s-a.s);renderLB();
  // Draw game over on canvas
  const g=ctx;
  g.fillStyle='rgba(2,3,8,.88)';g.fillRect(0,0,GW,GH);
  g.font='bold 24px Orbitron,monospace';g.textAlign='center';
  g.shadowColor='#ff2d78';g.shadowBlur=30;g.fillStyle='#ff2d78';
  g.fillText('GAME OVER',GW/2,GH/2-26);g.shadowBlur=0;
  g.font='12px Exo 2,sans-serif';g.fillStyle='#e8f4ff';
  g.fillText(`Final Score: ${gScore.toLocaleString()}   Wave: ${gWave}   Kills: ${totalKills}`,GW/2,GH/2+2);
  g.fillStyle='#00f5ff';g.font='11px Orbitron,monospace';
  g.fillText('RESTARTING IN 3 SECONDS…',GW/2,GH/2+26);
  let cd=3;
  const cdI=setInterval(()=>{
    cd--;g.clearRect(GW/2-120,GH/2+16,240,30);
    g.fillStyle='rgba(2,3,8,.88)';g.fillRect(GW/2-120,GH/2+16,240,30);
    g.font='11px Orbitron,monospace';g.textAlign='center';g.fillStyle='#00f5ff';
    g.fillText(`RESTARTING IN ${cd} SECOND${cd!==1?'S':''}…`,GW/2,GH/2+26);
    if(cd<=0){clearInterval(cdI);resetGame();}
  },1000);
}

function resetGame(){
  gScore=0;gLives=3;gWave=1;gWCD=0;gRunning=true;gFrame=0;
  bullets=[];enemies=[];coins=[];parts=[];pups=[];
  shield=false;shieldT=0;autoFireT=0;combo=0;comboT=0;
  aiPhase=0;aiPhaseT=0;waveText='';waveTextT=0;totalKills=0;
  initShip();spawnWave();
  updateGameUI();
  document.getElementById('gWave').textContent='1';
  document.getElementById('hWave').textContent='Wave 1';
  lbData[lbData.length-1].s=0;lbData[lbData.length-1].prev=0;
  renderLB();
}

/* ── LOOP ── */
function loop(){update();draw();requestAnimationFrame(loop);}

/* ── BOOT ── */
resizeCanvas();initBG();initShip();spawnWave();
loop();
// Initial feed messages
setTimeout(()=>addFeedMsg('msg'),500);
setTimeout(()=>addFeedMsg('msg'),1200);
setTimeout(()=>addFeedMsg('msg'),2000);
window.addEventListener('resize',()=>{resizeCanvas();initBG();});
</script>
